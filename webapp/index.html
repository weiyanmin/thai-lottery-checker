<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Thai Lottery Checker</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="app">

  <!-- ═══ Tab Content ═══ -->
  <div class="tab-content">

    <!-- ── CHECK TAB ── -->
    <div id="page-check" class="tab-page active">

      <!-- Date Selector -->
      <div class="section">
        <div class="section-header" data-i18n="selectDate">Select Draw Date</div>
        <div id="date-grid" class="date-grid"></div>
      </div>

      <!-- Number Input -->
      <div class="section">
        <div class="section-header" data-i18n="enterNumbers">Enter lottery numbers</div>
        <div class="input-group">
          <textarea
            id="numbers-input"
            data-i18n-placeholder="placeholder"
            placeholder="e.g. 123456, 789012, 345678"
            rows="3"
          ></textarea>
        </div>
        <p class="text-hint mb-12" data-i18n="pasteHint">Separate numbers with commas, spaces, or new lines</p>
        <button class="btn btn-primary mb-12" onclick="checkNumbers()" data-i18n="checkBtn">
          Check Numbers
        </button>

        <!-- Excel Upload -->
        <button class="btn btn-secondary" onclick="triggerExcelUpload()">
          <span>◇</span>
          <span data-i18n="orUpload">Or upload Excel file (.xlsx)</span>
        </button>
        <input type="file" id="excel-input" accept=".xlsx,.xls" style="display:none" onchange="handleExcelUpload(event)">
      </div>

      <!-- Results -->
      <div id="results-section" class="hidden">
        <div class="section">
          <div class="section-header" data-i18n="results">Results</div>
          <div id="results-container"></div>
        </div>
      </div>

    </div>

    <!-- ── SCAN TAB ── -->
    <div id="page-scan" class="tab-page">

      <div class="section">
        <div class="section-header" data-i18n="scanTitle">Scan Lottery Ticket</div>
        <p class="text-hint mb-16" data-i18n="scanDesc">Take a photo or upload an image of your lottery ticket</p>

        <div class="flex gap-8">
          <button class="btn btn-primary" onclick="triggerScan(true)" style="flex:1">
            <span>◎</span>
            <span data-i18n="takePhoto">Take Photo</span>
          </button>
          <button class="btn btn-secondary" onclick="triggerScan(false)" style="flex:1">
            <span>◇</span>
            <span data-i18n="uploadImage">Upload Image</span>
          </button>
        </div>

        <input type="file" id="scan-input" accept="image/*" style="display:none" onchange="handleScanUpload(event)">
      </div>

      <div id="scan-results" class="hidden"></div>

    </div>

    <!-- ── HISTORY TAB ── -->
    <div id="page-history" class="tab-page">

      <div class="section">
        <div class="section-header" data-i18n="historyTitle">Check History</div>
        <div id="history-list">
          <div class="empty-state">
            <div class="empty-icon">○</div>
            <p data-i18n="noHistory">No check history yet.</p>
          </div>
        </div>
      </div>

    </div>

    <!-- ── SETTINGS TAB ── -->
    <div id="page-settings" class="tab-page">

      <div class="section">
        <div class="section-header" data-i18n="settingsTitle">Settings</div>

        <!-- Language -->
        <div class="toggle-row">
          <span class="toggle-label" data-i18n="language">Language</span>
        </div>
        <div class="lang-picker mb-16">
          <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">English</button>
          <button class="lang-btn" data-lang="th" onclick="setLanguage('th')">ไทย</button>
          <button class="lang-btn" data-lang="my" onclick="setLanguage('my')">မြန်မာ</button>
        </div>

        <!-- Notifications -->
        <div class="toggle-row">
          <span class="toggle-label" data-i18n="notifications">Notifications</span>
          <label class="toggle-switch">
            <input type="checkbox" id="notif-toggle" onchange="toggleNotifications()">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Clear History -->
        <div class="toggle-row">
          <span class="toggle-label" data-i18n="clearHistory">Clear History</span>
          <button class="btn btn-sm btn-destructive" onclick="clearHistoryAction()" style="width:auto">
            ✗
          </button>
        </div>
      </div>

    </div>

  </div>

  <!-- ═══ Bottom Navigation ═══ -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="check">
      <span class="nav-icon">▸</span>
      <span data-i18n="check">Check</span>
    </button>
    <button class="nav-item" data-tab="scan">
      <span class="nav-icon">◎</span>
      <span data-i18n="scan">Scan</span>
    </button>
    <button class="nav-item" data-tab="history">
      <span class="nav-icon">≡</span>
      <span data-i18n="history">History</span>
    </button>
    <button class="nav-item" data-tab="settings">
      <span class="nav-icon">⚙</span>
      <span data-i18n="settings">Settings</span>
    </button>
  </nav>

</div>

<!-- Loading Overlay -->
<div id="loading-overlay" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <span id="loading-text" class="loading-text">Checking...</span>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
