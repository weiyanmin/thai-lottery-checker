services:
  - type: web
    name: thai-lottery-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: DEV_MODE
        value: "0"
